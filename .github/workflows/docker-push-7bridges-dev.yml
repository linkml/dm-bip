name: Build & Push Docker image (Seven Bridges)

on:
  push:
    branches: ["docker-dev", "docker-push-7bridges"]
    tags: ["bdc-v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: dm-bip-env

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (optional, for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Seven Bridges registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.SB_REGISTRY }}
          username: ${{ vars.SB_REGISTRY_USERNAME }}
          password: ${{ secrets.SB_REGISTRY_PASSWORD }}

      - name: Configure build for branch
        id: build-config
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.ref }}" == "refs/heads/docker-dev" ]]; then
            echo "pull_latest=true" >> "$GITHUB_OUTPUT"
            echo "registry_project=${{ vars.SB_REGISTRY_PROJECT_DEV }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/bdc-v* ]]; then
            echo "pull_latest=false" >> "$GITHUB_OUTPUT"
            echo "registry_project=${{ vars.SB_REGISTRY_PROJECT_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "pull_latest=false" >> "$GITHUB_OUTPUT"
            echo "registry_project=${{ vars.SB_REGISTRY_PROJECT }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.SB_REGISTRY }}/${{ vars.SB_REGISTRY_USERNAME }}/${{ steps.build-config.outputs.registry_project }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=match,pattern=bdc-v.*,enable=${{ startsWith(github.ref, 'refs/tags/bdc-v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BDC_PULL_LATEST=${{ steps.build-config.outputs.pull_latest }}
            DM_BIP_VERSION=${{ github.ref_name }}
            DM_BIP_GIT_REF=${{ github.sha }}
            DM_BIP_BUILD_DATE=${{ steps.build-config.outputs.build_date }}
