name: Build & Push Docker image (Seven Bridges)

on:
  push:
    branches: ["docker-dev", "docker-push-7bridges"]
    tags: ["bdc-v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: dm-bip-env

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and normalize registry settings
        id: registry-config
        shell: bash
        run: |
          registry='${{ vars.SB_REGISTRY }}'
          username='${{ vars.SB_REGISTRY_USERNAME }}'

          if [[ -z "$registry" ]]; then
            echo "SB_REGISTRY is empty. Set repository variable SB_REGISTRY." >&2
            exit 1
          fi

          if [[ -z "$username" ]]; then
            echo "SB_REGISTRY_USERNAME is empty. Set repository variable SB_REGISTRY_USERNAME." >&2
            exit 1
          fi

          # Normalize common input mistakes: protocol prefix, trailing slash, and /v2 suffix.
          registry="${registry#http://}"
          registry="${registry#https://}"
          registry="${registry%/}"
          registry="${registry%/v2}"

          if [[ "$registry" == */* ]]; then
            echo "SB_REGISTRY must be host only (example: images.sb.biodatacatalyst.nhlbi.nih.gov)." >&2
            echo "Current normalized value: $registry" >&2
            exit 1
          fi

          if [[ -z "${{ secrets.SB_REGISTRY_PASSWORD }}" ]]; then
            echo "SB_REGISTRY_PASSWORD is empty. Set repository secret SB_REGISTRY_PASSWORD." >&2
            exit 1
          fi

          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "username=$username" >> "$GITHUB_OUTPUT"
          echo "Using registry host: $registry"
          echo "Using registry username: $username"

      - name: Set up QEMU (optional, for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Seven Bridges registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry-config.outputs.registry }}
          # username: ${{ steps.registry-config.outputs.username }}
          # password: ${{ secrets.SB_REGISTRY_PASSWORD }}
          username: "vbakalov"
          password: "sofiaProlet@2026"

      - name: Configure build for branch
        id: build-config
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/docker-dev" ]]; then
            echo "pull_latest=true" >> "$GITHUB_OUTPUT"
            echo "registry_project=${{ vars.SB_REGISTRY_PROJECT_DEV }}" >> "$GITHUB_OUTPUT"
          else
            echo "pull_latest=false" >> "$GITHUB_OUTPUT"
            echo "registry_project=${{ vars.SB_REGISTRY_PROJECT }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, tag, and push image
        run: |
          IMAGE_URI=${{ steps.registry-config.outputs.registry }}/${{ steps.registry-config.outputs.username }}/${{ steps.build-config.outputs.registry_project }}/$IMAGE_NAME
          docker build \
            --build-arg BDC_PULL_LATEST=${{ steps.build-config.outputs.pull_latest }} \
            --build-arg CACHE_BUST=$(date +%s) \
            -t $IMAGE_NAME .
          docker tag $IMAGE_NAME $IMAGE_URI:latest
          docker push $IMAGE_URI:latest
