name: Build & Push Docker image (Seven Bridges)

on:
  push:
    branches: ["docker-dev", "docker-push-7bridges"]
    tags: ["bdc-v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: dm-bip-env

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (optional, for multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Seven Bridges registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.SB_REGISTRY }}
          username: ${{ vars.SB_REGISTRY_USERNAME }}
          password: ${{ secrets.SB_REGISTRY_PASSWORD }}

      - name: Configure build for branch
        id: build-config
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/docker-dev" ]]; then
            echo "pull_latest=true" >> "$GITHUB_OUTPUT"
            echo "registry_project=${{ vars.SB_REGISTRY_PROJECT_DEV }}" >> "$GITHUB_OUTPUT"
          else
            echo "pull_latest=false" >> "$GITHUB_OUTPUT"
            echo "registry_project=${{ vars.SB_REGISTRY_PROJECT }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build, tag, and push image
        run: |
          IMAGE_URI=${{ vars.SB_REGISTRY }}/${{ vars.SB_REGISTRY_USERNAME }}/${{ steps.build-config.outputs.registry_project }}/$IMAGE_NAME
          docker build \
            --build-arg BDC_PULL_LATEST=${{ steps.build-config.outputs.pull_latest }} \
            --build-arg CACHE_BUST=$(date +%s) \
            -t $IMAGE_NAME .
          docker tag $IMAGE_NAME $IMAGE_URI:latest
          docker push $IMAGE_URI:latest
