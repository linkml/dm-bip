name: ToyPreCleanedSourceSchema
description: Source schema for pre-cleaned toy data (human-readable column names)
id: https://w3id.org/ToyPreCleanedSourceSchema
prefixes:
  linkml: https://w3id.org/linkml/
  source: https://w3id.org/ToyPreCleanedSourceSchema/
imports:
  - linkml:types
default_prefix: source
default_range: string

classes:
  demographics:
    description: Demographics data from demographics.tsv
    attributes:
      subject_id:
        identifier: true
      sex:
      race:
      ethnicity:
      age:
        range: integer
      smoking_status:

  subject:
    description: Subject data from subject.tsv
    attributes:
      subject_id:
        identifier: true
      asthma:
      stroke:
      heart_disease:
      diabetes:
      consent_codes:
      study.id:
      project.id:
      participant.id:
