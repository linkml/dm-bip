name: EnumTestSource
description: Source schema with enums for testing enum derivations
id: https://w3id.org/EnumTestSource
prefixes:
  linkml: https://w3id.org/linkml/
  source: https://w3id.org/EnumTestSource/
imports:
  - linkml:types
default_prefix: source
default_range: string

enums:
  sex_enum:
    permissible_values:
      Male:
        description: Male
      Female:
        description: Female

classes:
  demographics:
    attributes:
      subject_id:
        identifier: true
      sex:
        range: sex_enum
      race:
      ethnicity:
      age:
        range: integer
      smoking_status:
